<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
        }

        header,
        footer {
            background: #333;
            color: white;
            padding: 1rem;
            text-align: center;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        header h1 {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            margin: 0;
        }

        .navbar {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0 0 0 auto;
            padding: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        main {
            margin: 2rem 0;
        }
                /* Dark Mode Styling */
        body.dark-mode {
        background-color: #222;
        color: #f1f1f1;
        }

        body.dark-mode header,
        body.dark-mode footer {
        background: #111;
        color: #eee;
        }

        body.dark-mode a {
        color: #ffdd57;
        }
        #theme-toggle {
        background: none;    /* no background */
        border: none;        /* no border */
        font-size: 1.4rem;   /* make the icon bigger */
        cursor: pointer;     /* pointer on hover */
        margin-left: 1rem;   /* spacing */
        }

        #theme-toggle:hover {
        opacity: 0.7;        /* slight fade effect on hover */
        }

    </style>
</head>

<body>
    <header>
        <h1>Welcome to My Website</h1>
        <ul class="navbar">
            <li><a href="">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <button id="theme-toggle">🌙 Dark Mode</button>
    </header>

    <main>
        <h2>Hello World</h2>
        <p>This is a starter HTML template. You can add more content here.</p>
    </main>

    <footer>
        <p>&copy; 2025 My Website</p>
    </footer>
    <script src="theme-toggle.js"></script>
</body>

</html>
